name: Firestore Rules Tests

on:
  push:
    branches: [v2]
  pull_request:
    branches: [v2]

jobs:
  test-rules:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kickoff-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java (required by the Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --allow-scripts       

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run Firestore emulator and rules tests
        run: firebase emulators:exec --only firestore --project team-management-7d995 "npx mocha tests/firestore.rules.test.mjs"