name: Firestore Rules Tests

on:
  push:
    branches:
      - v2
  pull_request:
    branches:
      - v2

jobs:
  test-rules:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: kickoff-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: kickoff-web/pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Firebase CLI
        run: pnpm dlx firebase-tools@latest --version

      - name: Run Firestore Rules Tests
        run: |
          pnpm dlx firebase-tools emulators:exec \
            --only firestore \
            --project team-management-7d995 \
            "pnpm exec mocha tests/firestore.rules.test.mjs"