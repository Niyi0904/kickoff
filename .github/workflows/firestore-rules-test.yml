name: Firestore Rules Tests

on:
  push:
    branches: [v2]
  pull_request:
    branches: [v2]

jobs:
  test-rules:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: kickoff-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: kickoff-web/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Firebase CLI
        run: pnpm dlx firebase-tools --version

      - name: Run Firestore tests
        run: pnpm exec firebase emulators:exec \
          --only firestore \
          --project team-management-7d995 \
          "pnpm exec mocha tests/firestore.rules.test.mjs"